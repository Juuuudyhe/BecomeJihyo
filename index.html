<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  
  :root {
    --bg-primary: #0a0a0a;
    --bg-card: #161616;
    --bg-elevated: #1f1f1f;
    --bg-border: #2a2a2a;
    --text-primary: #fafafa;
    --text-secondary: #a3a3a3;
    --text-tertiary: #525252;
    --accent: #ff3d00;
    --accent-glow: #ff3d0033;
    --success: #00e676;
    --warning: #ffab00;
    --period: #ff4081;
    --rest: #6b6b6b;
  }
  
  html, body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Noto Sans TC', sans-serif;
    overscroll-behavior: none;
    min-height: 100vh;
  }
  
  body {
    padding-bottom: 80px;
  }
  
  /* === Header === */
  .header {
    background: linear-gradient(180deg, #1a1a1a 0%, var(--bg-primary) 100%);
    padding: 24px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--bg-border);
  }
  
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  .header-title .accent {
    color: var(--accent);
  }
  
  .header-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  
  /* === Tabs === */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-card);
    border-top: 1px solid var(--bg-border);
    display: flex;
    justify-content: space-around;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  
  .tab {
    flex: 1;
    padding: 8px 4px;
    background: none;
    border: none;
    color: var(--text-tertiary);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  
  .tab.active {
    color: var(--accent);
  }
  
  .tab-icon {
    font-size: 20px;
  }
  
  /* === Page Container === */
  .page {
    display: none;
    padding: 20px;
    animation: fadeIn 0.3s ease;
  }
  
  .page.active {
    display: block;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* === Day Selector === */
  .day-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  
  .day-btn {
    padding: 12px 4px;
    background: var(--bg-card);
    border: 1px solid var(--bg-border);
    border-radius: 12px;
    color: var(--text-secondary);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .day-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }
  
  /* === Exercise Card === */
  .exercise-card {
    background: var(--bg-card);
    border: 1px solid var(--bg-border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    transition: all 0.2s;
  }
  
  .exercise-card.completed {
    border-color: var(--success);
    background: linear-gradient(135deg, #161616 0%, #00e6760a 100%);
  }
  
  .exercise-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  
  .exercise-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    flex: 1;
  }
  
  .exercise-tag {
    display: inline-block;
    padding: 2px 8px;
    background: var(--accent-glow);
    color: var(--accent);
    font-size: 10px;
    border-radius: 4px;
    margin-left: 8px;
    font-weight: 700;
  }
  
  .exercise-target {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  
  .last-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--warning);
    margin-bottom: 12px;
    padding: 6px 10px;
    background: #ffab0015;
    border-radius: 6px;
    display: inline-block;
  }
  
  .last-time.empty {
    color: var(--text-tertiary);
    background: transparent;
    padding: 0;
  }
  
  /* === Input Group === */
  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  
  .input-label {
    font-size: 10px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'JetBrains Mono', monospace;
  }
  
  .input-field {
    background: var(--bg-elevated);
    border: 1px solid var(--bg-border);
    border-radius: 8px;
    padding: 10px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    width: 100%;
    text-align: center;
  }
  
  .input-field:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  /* === Feel Slider === */
  .feel-row {
    display: flex;
    gap: 6px;
    margin: 10px 0;
  }
  
  .feel-btn {
    flex: 1;
    padding: 8px 0;
    background: var(--bg-elevated);
    border: 1px solid var(--bg-border);
    border-radius: 8px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  
  .feel-btn.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  
  /* === Save Button === */
  .save-btn {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  
  .save-btn:active {
    transform: scale(0.98);
  }
  
  .save-btn.done {
    background: var(--success);
    color: var(--bg-primary);
  }
  
  /* === Progress Page === */
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--bg-border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  
  .stat-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--text-primary);
    letter-spacing: 1px;
  }
  
  .stat-unit {
    font-size: 14px;
    color: var(--text-secondary);
    margin-left: 4px;
  }
  
  .progress-chart {
    background: var(--bg-card);
    border: 1px solid var(--bg-border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  
  .chart-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  
  .chart-canvas {
    width: 100%;
    height: 120px;
    background: var(--bg-elevated);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
  }
  
  /* === Diet Page === */
  .diet-upload {
    background: var(--bg-card);
    border: 2px dashed var(--bg-border);
    border-radius: 16px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  
  .diet-upload:active {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  
  .diet-upload-icon {
    font-size: 36px;
    margin-bottom: 8px;
  }
  
  .diet-upload-text {
    font-size: 14px;
    color: var(--text-secondary);
  }
  
  #photoInput {
    display: none;
  }
  
  .diet-entry {
    background: var(--bg-card);
    border: 1px solid var(--bg-border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  
  .diet-photo {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }
  
  .diet-meta {
    padding: 12px;
  }
  
  .diet-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 6px;
  }
  
  .diet-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  
  .diet-tag {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  
  .tag-meal {
    background: #ff3d0020;
    color: var(--accent);
  }
  
  .tag-protein-low {
    background: #ffab0020;
    color: var(--warning);
  }
  
  .tag-protein-ok {
    background: #00e67620;
    color: var(--success);
  }
  
  .diet-note {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 8px;
  }
  
  .diet-tag-input {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  
  .tag-toggle {
    padding: 4px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--bg-border);
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    color: var(--text-secondary);
  }
  
  .tag-toggle.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  
  .diet-delete {
    background: none;
    border: none;
    color: var(--text-tertiary);
    font-size: 11px;
    margin-top: 8px;
    cursor: pointer;
    padding: 4px 0;
    font-family: inherit;
  }
  
  /* === Cycle Page === */
  .cycle-calendar {
    background: var(--bg-card);
    border: 1px solid var(--bg-border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }
  
  .cycle-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  
  .cycle-month {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
  }
  
  .cycle-nav {
    background: var(--bg-elevated);
    border: 1px solid var(--bg-border);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--text-primary);
    cursor: pointer;
    font-size: 14px;
  }
  
  .cycle-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  
  .cycle-day-label {
    text-align: center;
    font-size: 10px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    padding: 4px 0;
    font-family: 'JetBrains Mono', monospace;
  }
  
  .cycle-day {
    aspect-ratio: 1;
    background: var(--bg-elevated);
    border: 1px solid transparent;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    position: relative;
    font-family: 'JetBrains Mono', monospace;
  }
  
  .cycle-day.today {
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
  }
  
  .cycle-day.period {
    background: var(--period);
    color: white;
  }
  
  .cycle-day.follicular {
    background: #00e67625;
    color: var(--success);
  }
  
  .cycle-day.luteal {
    background: #ffab0025;
    color: var(--warning);
  }
  
  .cycle-day.empty {
    visibility: hidden;
  }
  
  .cycle-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--bg-border);
  }
  
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }
  
  .cycle-info {
    background: var(--bg-card);
    border: 1px solid var(--bg-border);
    border-radius: 16px;
    padding: 16px;
  }
  
  .cycle-info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--bg-border);
  }
  
  .cycle-info-row:last-child {
    border-bottom: none;
  }
  
  .cycle-info-label {
    font-size: 12px;
    color: var(--text-secondary);
  }
  
  .cycle-info-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-primary);
    font-weight: 700;
  }
  
  .cycle-training-hint {
    background: var(--bg-elevated);
    border-left: 3px solid var(--accent);
    padding: 12px;
    border-radius: 6px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  
  .cycle-training-hint strong {
    color: var(--accent);
    font-weight: 700;
  }
  
  /* === Data Management === */
  .data-section {
    background: var(--bg-card);
    border: 1px solid var(--bg-border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  
  .data-section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  
  .data-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--bg-border);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 8px;
    text-align: center;
    transition: all 0.2s;
  }
  
  .data-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 700;
  }
  
  .data-btn:active {
    transform: scale(0.98);
  }
  
  .data-hint {
    font-size: 11px;
    color: var(--text-tertiary);
    line-height: 1.6;
    margin-top: 8px;
    padding: 8px;
    background: var(--bg-elevated);
    border-radius: 6px;
  }
  
  /* === Export Modal === */
  .export-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 16px;
  }
  
  .export-modal.show {
    display: flex;
  }
  
  .export-content {
    background: var(--bg-card);
    border: 1px solid var(--bg-border);
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .export-header {
    padding: 16px;
    border-bottom: 1px solid var(--bg-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .export-title {
    font-weight: 700;
    font-size: 15px;
  }
  
  .export-close {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 22px;
    cursor: pointer;
    padding: 0 8px;
  }
  
  .export-textarea {
    flex: 1;
    width: 100%;
    background: var(--bg-elevated);
    border: none;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 12px;
    resize: none;
    min-height: 200px;
    line-height: 1.5;
  }
  
  .export-textarea:focus {
    outline: none;
  }
  
  .export-actions {
    padding: 12px;
    border-top: 1px solid var(--bg-border);
    display: flex;
    gap: 8px;
  }
  
  .export-action-btn {
    flex: 1;
    padding: 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--bg-border);
    border-radius: 8px;
    color: var(--text-primary);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
  }
  
  .export-action-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  
  /* === Modal === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  
  .modal-overlay.show {
    display: flex;
  }
  
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--bg-border);
    border-radius: 16px;
    padding: 20px;
    max-width: 320px;
    width: 100%;
  }
  
  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  
  .modal-btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
  }
  
  .modal-btn {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--bg-border);
    background: var(--bg-elevated);
    color: var(--text-primary);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  
  .modal-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  
  /* === Empty State === */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-tertiary);
  }
  
  .empty-icon {
    font-size: 48px;

  .empty-text {
    font-size: 13px;
  }
  
  /* === Workout Toast === */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: var(--bg-primary);
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 14px;
    z-index: 300;
    animation: toastIn 0.3s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);

  @keyframes toastIn {
    from { transform: translate(-50%, 20px); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }
  
  /* === PR Badge === */
  .pr-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-family: 'Bebas Neue', sans-serif;

  </div>
  <div class="header-date" id="todayDate"></div>
</div>

<!-- 訓練頁 -->
<div class="page active" id="page-workout">
  <div class="day-selector">
    <button class="day-btn" data-day="chest">胸</button>
    <button class="day-btn" data-day="leg">腿</button>
    <button class="day-btn" data-day="shoulder">肩</button>
    <button class="day-btn" data-day="back">背</button>
  </div>
  <div id="exerciseList"></div>
</div>

<!-- 進度頁 -->
<div class="page" id="page-progress">
  <div class="stat-card">
    <div class="stat-title">累計訓練次數</div>
    <div><span class="stat-value" id="totalSessions">0</span><span class="stat-unit">次</span></div>
  </div>
  <div class="stat-card">
    <div class="stat-title">本週訓練</div>
    <div><span class="stat-value" id="weekSessions">0</span><span class="stat-unit">/ 4 天</span></div>
  </div>
  
  <!-- 資料管理區 -->
  <div class="data-section">
    <div class="data-section-title">資料管理</div>
    <button class="data-btn primary" onclick="exportWeekly()">
      📤 匯出本週紀錄（給 Claude 分析）
    </button>
    <button class="data-btn" onclick="exportAll()">
      💾 匯出全部資料（備份用）
    </button>
    <label class="data-btn" for="importInput">
      📥 匯入備份
    </label>
    <input type="file" id="importInput" accept=".json,.txt" style="display:none;">
    <div class="data-hint">
      匯出本週紀錄會產生一段文字，複製貼給 Claude 就能分析進步。<br>
      匯出全部資料是 JSON 檔，換手機時可以匯入。
    </div>
  </div>
  
  <div id="exerciseProgress"></div>
</div>

<!-- 飲食頁 -->
<div class="page" id="page-diet">
  <label class="diet-upload" for="photoInput">
    <div class="diet-upload-icon">📸</div>
    <div class="diet-upload-text">拍照記錄這餐</div>
  </label>
  <input type="file" id="photoInput" accept="image/*" capture="environment">
  <div id="dietList"></div>
</div>

<!-- 月經週期頁 -->
<div class="page" id="page-cycle">
  <div class="cycle-calendar">
    <div class="cycle-header">
      <button class="cycle-nav" onclick="changeMonth(-1)">‹</button>
      <div class="cycle-month" id="cycleMonth"></div>
      <button class="cycle-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cycle-grid" id="cycleGrid"></div>
    <div class="cycle-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--period)"></div>經期</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00e67625"></div>濾泡期</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffab0025"></div>黃體期</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>今天</div>
    </div>

<script>
// =========== 菜單資料 ===========
const MENU = {

  },
  back: {

    exercises: [
      { id: 'bk_run', name: '跑步機暖身', target: '坡度 12 / 速度 5.0 / 20 分鐘', defaultWeight: 0, defaultReps: 20, defaultSets: 1, unit: '分鐘' },
      { id: 'bk_lat_wide', name: '滑輪下拉（正握寬握）', target: '4 組 × 12 次', defaultWeight: 20, defaultReps: 12, defaultSets: 4 },
      { id: 'bk_lat_narrow', name: '滑輪下拉（反握窄握）', target: '4 組 × 12 次', defaultWeight: 20, defaultReps: 12, defaultSets: 4 },
      { id: 'bk_row', name: '低拉訓練器（坐姿划船）', target: '4 組 × 12 次', defaultWeight: 25, defaultReps: 12, defaultSets: 4 },
      { id: 'bk_tbar', name: '俯臥拉背機 🆕', target: '3 組 × 12 次', defaultWeight: 15, defaultReps: 12, defaultSets: 3, new: true },
      { id: 'bk_facepull', name: 'Cable 臉拉 🆕', target: '3 組 × 15 次（重感受不重重量）', defaultWeight: 10, defaultReps: 15, defaultSets: 3, new: true },
      { id: 'bk_curl', name: '二頭彎舉（器械式）🆕', target: '3 組 × 12 次', defaultWeight: 10, defaultReps: 12, defaultSets: 3, new: true },
      { id: 'bk_abs', name: '腹部捲體機', target: '4 組 × 12 次', defaultWeight: 35, defaultReps: 12, defaultSets: 4 }
    ]
  }
};

const FEEL_OPTIONS = [
  { value: 1, label: '無感' },
  { value: 2, label: '輕鬆' },
  { value: 3, label: '剛好' },
  { value: 4, label: '吃力' },
  { value: 5, label: '爆酸' }
];

// =========== 資料儲存 ===========
const STORAGE = {
  get: (key, def) => {
    try {
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : def;
    } catch (e) { return def; }
  },
  set: (key, val) => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }
};

let currentDay = 'chest';
let workoutLogs = STORAGE.get('workoutLogs', {}); // { date: { exerciseId: { weight, reps, sets, feel } } }
let dietLogs = STORAGE.get('dietLogs', []);
let periodData = STORAGE.get('periodData', { periods: [], cycleLength: 28 });
let calendarDate = new Date();

// =========== 工具 ===========
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const formatDate = (str) => {
  const d = new Date(str);
  return `${d.getMonth()+1}/${d.getDate()}`;
};

// =========== 初始化 ===========
function init() {
  const d = new Date();
  const weekdays = ['日','一','二','三','四','五','六'];
  document.getElementById('todayDate').textContent = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} 星期${weekdays[d.getDay()]}`;
  
  // 預設今天訓練類型（簡單邏輯：週一胸 週二腿 週四肩 週五背）
  const dayMap = { 1: 'chest', 2: 'leg', 4: 'shoulder', 5: 'back' };
  const suggestedDay = dayMap[d.getDay()];
  if (suggestedDay) {
    currentDay = suggestedDay;
    document.getElementById('todayDay').textContent = MENU[suggestedDay].name;
  } else {
    document.getElementById('todayDay').textContent = '休息日';
  }
  
  // Tab 切換
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`page-${tab.dataset.page}`).classList.add('active');
      if (tab.dataset.page === 'progress') renderProgress();
      if (tab.dataset.page === 'diet') renderDiet();
      if (tab.dataset.page === 'cycle') renderCycle();
    });
  });
  
  // 日期切換
  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentDay = btn.dataset.day;
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderWorkout();
    });
  });
  
  document.querySelector(`.day-btn[data-day="${currentDay}"]`).classList.add('active');
  renderWorkout();
  
  // 飲食照片上傳
  document.getElementById('photoInput').addEventListener('change', handlePhotoUpload);
  document.getElementById('importInput').addEventListener('change', handleImport);
}

// =========== 訓練頁 ===========
function renderWorkout() {
  const menu = MENU[currentDay];
  const today = todayKey();
  const todayLog = workoutLogs[today] || {};
  
  const list = document.getElementById('exerciseList');
  list.innerHTML = menu.exercises.map(ex => {
    const log = todayLog[ex.id];
    const lastLog = findLastLog(ex.id);
    
    return `
      <div class="exercise-card ${log ? 'completed' : ''}" id="card-${ex.id}">
        <div class="exercise-header">
          <div>
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-target">目標：${ex.target}</div>
          </div>
        </div>
        ${lastLog ? `
          <div class="last-time">
            上次（${formatDate(lastLog.date)}）：${lastLog.weight}${ex.unit||'kg'} × ${lastLog.reps} × ${lastLog.sets}組 · 感受 ${lastLog.feel}/5
          </div>
        ` : '<div class="last-time empty">尚無紀錄</div>'}
        <div class="input-row">
          <div class="input-group">
            <label class="input-label">重量(${ex.unit||'kg'})</label>
            <input class="input-field" type="number" step="0.5" id="w-${ex.id}" value="${log ? log.weight : ex.defaultWeight}">
          </div>
          <div class="input-group">
            <label class="input-label">次數</label>
            <input class="input-field" type="number" id="r-${ex.id}" value="${log ? log.reps : ex.defaultReps}">
          </div>
          <div class="input-group">
            <label class="input-label">組數</label>
            <input class="input-field" type="number" id="s-${ex.id}" value="${log ? log.sets : ex.defaultSets}">
          </div>
        </div>
        <div class="input-label" style="margin-top:8px;">感受度</div>
        <div class="feel-row">
          ${FEEL_OPTIONS.map(opt => `
            <button class="feel-btn ${log && log.feel === opt.value ? 'selected' : ''}" 
              data-ex="${ex.id}" data-feel="${opt.value}" onclick="selectFeel('${ex.id}', ${opt.value})">
              ${opt.value}
            </button>
          `).join('')}
        </div>
        <button class="save-btn ${log ? 'done' : ''}" onclick="saveExercise('${ex.id}')">
          ${log ? '✓ 已完成' : '儲存'}
        </button>
      </div>
    `;
  }).join('');
}

function findLastLog(exerciseId) {
  const today = todayKey();
  const dates = Object.keys(workoutLogs).filter(d => d !== today).sort().reverse();
  for (const d of dates) {
    if (workoutLogs[d][exerciseId]) {
      return { date: d, ...workoutLogs[d][exerciseId] };
    }
  }
  return null;
}

function selectFeel(exId, feel) {
  document.querySelectorAll(`.feel-btn[data-ex="${exId}"]`).forEach(b => b.classList.remove('selected'));
  document.querySelector(`.feel-btn[data-ex="${exId}"][data-feel="${feel}"]`).classList.add('selected');
}

function saveExercise(exId) {
  const today = todayKey();
  if (!workoutLogs[today]) workoutLogs[today] = {};
  
  const weight = parseFloat(document.getElementById(`w-${exId}`).value) || 0;
  const reps = parseInt(document.getElementById(`r-${exId}`).value) || 0;
  const sets = parseInt(document.getElementById(`s-${exId}`).value) || 0;
  const feelBtn = document.querySelector(`.feel-btn[data-ex="${exId}"].selected`);
  const feel = feelBtn ? parseInt(feelBtn.dataset.feel) : 3;
  
  // 檢查是否是 PR
  const isPR = checkPR(exId, weight);
  
  workoutLogs[today][exId] = { weight, reps, sets, feel };
  STORAGE.set('workoutLogs', workoutLogs);
  
  showToast(isPR ? `🔥 新紀錄 PR！` : '✓ 已儲存');
  renderWorkout();
}

function checkPR(exId, weight) {
  let max = 0;
  const today = todayKey();
  for (const d of Object.keys(workoutLogs)) {
    if (d === today) continue;
    if (workoutLogs[d][exId] && workoutLogs[d][exId].weight > max) {
      max = workoutLogs[d][exId].weight;
    }
  }
  return weight > max && max > 0;
}

// =========== 進度頁 ===========
function renderProgress() {
  // 累計次數
  const total = Object.keys(workoutLogs).length;
  document.getElementById('totalSessions').textContent = total;
  
  // 本週次數
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay() + 1); // 週一開始
  weekStart.setHours(0,0,0,0);
  const weekCount = Object.keys(workoutLogs).filter(d => new Date(d) >= weekStart).length;
  document.getElementById('weekSessions').textContent = weekCount;
  
  // 各動作進步圖
  const progressDiv = document.getElementById('exerciseProgress');
  
  // 收集每個動作的歷史
  const exerciseHistory = {};
  Object.keys(workoutLogs).sort().forEach(date => {
    Object.entries(workoutLogs[date]).forEach(([exId, log]) => {
      if (!exerciseHistory[exId]) exerciseHistory[exId] = [];
      exerciseHistory[exId].push({ date, weight: log.weight });
    });
  });
  
  // 找到動作名稱
  const exMeta = {};
  Object.values(MENU).forEach(day => {
    day.exercises.forEach(ex => { exMeta[ex.id] = ex; });
  });
  
  if (Object.keys(exerciseHistory).length === 0) {
    progressDiv.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📈</div>
        <div class="empty-text">開始訓練後，這裡會顯示妳每個動作的進步曲線</div>
      </div>
    `;
    return;
  }
  
  progressDiv.innerHTML = Object.entries(exerciseHistory)
    .filter(([_, history]) => history.length >= 1)
    .map(([exId, history]) => {
      const ex = exMeta[exId];
      if (!ex) return '';
      const last = history[history.length - 1];
      const first = history[0];
      const change = history.length > 1 ? (last.weight - first.weight).toFixed(1) : 0;
      
      return `
        <div class="progress-chart">
          <div class="chart-title">${ex.name}</div>
          <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px;">
            目前 ${last.weight}${ex.unit||'kg'} 
            ${change > 0 ? `<span style="color:var(--success)">↑ +${change}</span>` : ''}
            ${change < 0 ? `<span style="color:var(--warning)">↓ ${change}</span>` : ''}
          </div>
          <div class="chart-canvas">
            ${renderMiniChart(history)}
          </div>
        </div>
      `;
    }).join('');
}

function renderMiniChart(history) {
  if (history.length < 2) {
    return `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);font-size:11px;">需要至少 2 次紀錄才能畫圖</div>`;
  }
  
  const weights = history.map(h => h.weight);
  const max = Math.max(...weights);
  const min = Math.min(...weights);
  const range = max - min || 1;
  const w = 100;
  const h = 100;
  
  const points = history.map((p, i) => {
    const x = (i / (history.length - 1)) * w;
    const y = h - ((p.weight - min) / range) * 80 - 10;
    return `${x},${y}`;
  });
  
  return `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:100%;">
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff3d00" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#ff3d00" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon points="0,${h} ${points.join(' ')} ${w},${h}" fill="url(#grad)"/>
      <polyline points="${points.join(' ')}" fill="none" stroke="#ff3d00" stroke-width="2" vector-effect="non-scaling-stroke"/>
      ${history.map((p, i) => {
        const x = (i / (history.length - 1)) * w;
        const y = h - ((p.weight - min) / range) * 80 - 10;
        return `<circle cx="${x}" cy="${y}" r="2" fill="#ff3d00"/>`;
      }).join('')}
    </svg>
  `;
}

// =========== 飲食頁 ===========
function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (event) => {
    const newEntry = {
      id: Date.now(),
      photo: event.target.result,
      time: new Date().toISOString(),
      mealType: '',
      tags: [],
      note: ''
    };
    dietLogs.unshift(newEntry);
    STORAGE.set('dietLogs', dietLogs);
    renderDiet();
    showToast('✓ 已儲存');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function renderDiet() {
  const list = document.getElementById('dietList');
  if (dietLogs.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🍱</div>
        <div class="empty-text">拍下這餐，建立飲食習慣紀錄</div>
      </div>
    `;
    return;
  }
  
  list.innerHTML = dietLogs.map(entry => {
    const d = new Date(entry.time);
    const timeStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    
    return `
      <div class="diet-entry" id="diet-${entry.id}">
        <img class="diet-photo" src="${entry.photo}">
        <div class="diet-meta">
          <div class="diet-time">${timeStr}</div>
          <div class="diet-tag-input">
            ${['早餐','午餐','晚餐','點心'].map(m => `
              <span class="tag-toggle ${entry.mealType === m ? 'selected' : ''}" 
                onclick="setDietTag(${entry.id}, 'mealType', '${m}')">${m}</span>
            `).join('')}
          </div>
          <div class="diet-tag-input">
            ${['蛋白質夠','蛋白質低','碳水高','蔬菜足','重醬料'].map(t => `
              <span class="tag-toggle ${entry.tags.includes(t) ? 'selected' : ''}" 
                onclick="toggleDietTag(${entry.id}, '${t}')">${t}</span>
            `).join('')}
          </div>
          <button class="diet-delete" onclick="deleteDiet(${entry.id})">刪除這筆</button>
        </div>
      </div>
    `;
  }).join('');
}

function setDietTag(id, key, val) {
  const entry = dietLogs.find(e => e.id === id);
  if (entry) {
    entry[key] = entry[key] === val ? '' : val;
    STORAGE.set('dietLogs', dietLogs);
    renderDiet();
  }
}

function toggleDietTag(id, tag) {
  const entry = dietLogs.find(e => e.id === id);
  if (entry) {
    const idx = entry.tags.indexOf(tag);
    if (idx >= 0) entry.tags.splice(idx, 1);
    else entry.tags.push(tag);
    STORAGE.set('dietLogs', dietLogs);
    renderDiet();
  }
}

function deleteDiet(id) {
  if (confirm('確定要刪除這筆紀錄嗎？')) {
    dietLogs = dietLogs.filter(e => e.id !== id);
    STORAGE.set('dietLogs', dietLogs);
    renderDiet();
  }
}

// =========== 月經週期頁 ===========
let selectedDate = null;

function renderCycle() {
  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();
  document.getElementById('cycleMonth').textContent = `${year}.${String(month+1).padStart(2,'0')}`;
  
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  
  const grid = document.getElementById('cycleGrid');
  let html = '';
  
  // 星期標題
  ['日','一','二','三','四','五','六'].forEach(d => {
    html += `<div class="cycle-day-label">${d}</div>`;
  });
  
  // 空白格
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cycle-day empty"></div>';
  }
  
  // 日期
  const today = new Date();
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const phase = getPhase(dateStr);
    let cls = 'cycle-day';
    if (isToday) cls += ' today';
    if (phase) cls += ` ${phase}`;
    html += `<div class="${cls}" onclick="openPeriodModal('${dateStr}')">${day}</div>`;
  }
  
  grid.innerHTML = html;
  
  // 當前階段資訊
  updatePhaseInfo();
}

function getPhase(dateStr) {
  if (!periodData.periods || periodData.periods.length === 0) return null;
  
  const date = new Date(dateStr);
  
  // 檢查是否在某個經期內
  for (const p of periodData.periods) {
    const start = new Date(p.start);
    const end = p.end ? new Date(p.end) : new Date(start.getTime() + 5*24*60*60*1000);
    if (date >= start && date <= end) return 'period';
  }
  
  // 找最近的經期
  const sortedPeriods = [...periodData.periods].sort((a,b) => new Date(b.start) - new Date(a.start));
  const lastPeriod = sortedPeriods.find(p => new Date(p.start) <= date);
  if (!lastPeriod) return null;
  
  const lastStart = new Date(lastPeriod.start);
  const daysSince = Math.floor((date - lastStart) / (24*60*60*1000));
  const cycleLen = periodData.cycleLength || 28;
  
  if (daysSince > cycleLen) return null;
  if (daysSince <= cycleLen / 2) return 'follicular'; // 濾泡期
  return 'luteal'; // 黃體期
}

function updatePhaseInfo() {
  const today = new Date();
  const todayStr = todayKey();
  const phase = getPhase(todayStr);
  
  const phaseMap = {
    period: { name: '經期', hint: '<strong>休息為主</strong>。可做輕度伸展、Zone 2 散步。經期不需強迫訓練，恢復才是重點。' },
    follicular: { name: '濾泡期 ⚡', hint: '<strong>強度高峰期！</strong>身體耐受度最高，這幾天適合挑戰重量、嘗試 PR。可以把腿日臀推、背日下拉的重量往上推。' },
    luteal: { name: '黃體期', hint: '<strong>強度回落</strong>。可能會水腫、易疲勞。維持訓練但不強求進步，重感受度、動作品質優先。' }
  };
  
  if (phase && phaseMap[phase]) {
    document.getElementById('currentPhase').textContent = phaseMap[phase].name;
    document.getElementById('trainingHint').innerHTML = phaseMap[phase].hint;
  } else {
    document.getElementById('currentPhase').textContent = '尚未標記';
    document.getElementById('trainingHint').innerHTML = '點擊日期標記經期開始日，系統會自動推算濾泡期/黃體期，並對齊訓練強度建議。';
  }
  
  // 距離下次
  if (periodData.periods.length > 0) {
    const sortedPeriods = [...periodData.periods].sort((a,b) => new Date(b.start) - new Date(a.start));
    const lastStart = new Date(sortedPeriods[0].start);
    const nextStart = new Date(lastStart.getTime() + (periodData.cycleLength || 28) * 24*60*60*1000);
    const daysToNext = Math.ceil((nextStart - today) / (24*60*60*1000));
    document.getElementById('daysToNext').textContent = daysToNext >= 0 ? `${daysToNext} 天` : '已超過預期';
    
    // 平均週期
    if (periodData.periods.length >= 2) {
      const sorted = [...periodData.periods].sort((a,b) => new Date(a.start) - new Date(b.start));
      const diffs = [];
      for (let i = 1; i < sorted.length; i++) {
        const d = Math.round((new Date(sorted[i].start) - new Date(sorted[i-1].start)) / (24*60*60*1000));
        diffs.push(d);
      }
      const avg = Math.round(diffs.reduce((a,b)=>a+b,0) / diffs.length);
      document.getElementById('avgCycle').textContent = `${avg} 天`;
      periodData.cycleLength = avg;
      STORAGE.set('periodData', periodData);
    } else {
      document.getElementById('avgCycle').textContent = '28 天（預設）';
    }
  } else {
    document.getElementById('daysToNext').textContent = '-';
    document.getElementById('avgCycle').textContent = '-';
  }
}

function changeMonth(delta) {
  calendarDate.setMonth(calendarDate.getMonth() + delta);
  renderCycle();
}

function openPeriodModal(dateStr) {
  selectedDate = dateStr;
  const d = new Date(dateStr);
  document.getElementById('periodModalDate').textContent = `${d.getMonth()+1}月${d.getDate()}日`;
  document.getElementById('periodModal').classList.add('show');
}

function closeModal() {
  document.getElementById('periodModal').classList.remove('show');
  selectedDate = null;
}

function markPeriod(action) {
  if (!selectedDate) return;
  
  if (action === 'start') {
    // 檢查有沒有未結束的經期
    const ongoing = periodData.periods.find(p => !p.end);
    if (ongoing) {
      if (!confirm('上一次經期還沒結束，確定要開始新的經期嗎？\n（會自動把上一次結束於前一天）')) {
        closeModal();
        return;
      }
      // 把舊的結束於 selectedDate 前一天
      const prev = new Date(selectedDate);
      prev.setDate(prev.getDate() - 1);
      ongoing.end = prev.toISOString().split('T')[0];
    }
    periodData.periods.push({ start: selectedDate });
  } else if (action === 'end') {
    const ongoing = [...periodData.periods].reverse().find(p => !p.end);
    if (ongoing) {
      ongoing.end = selectedDate;
    } else {
      alert('沒有進行中的經期可以結束。請先標記開始日。');
      closeModal();
      return;
    }
  } else if (action === 'clear') {
    periodData.periods = periodData.periods.filter(p => {
      const start = new Date(p.start);
      const end = p.end ? new Date(p.end) : new Date(start.getTime() + 7*24*60*60*1000);
      const target = new Date(selectedDate);
      return !(target >= start && target <= end);
    });
  }
  
  STORAGE.set('periodData', periodData);
  closeModal();
  renderCycle();
}

// =========== 匯出 / 匯入 ===========
function exportWeekly() {
  // 取得本週訓練紀錄（週一開始）
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
  weekStart.setHours(0,0,0,0);
  
  const exMeta = {};
  Object.values(MENU).forEach(day => {
    day.exercises.forEach(ex => { exMeta[ex.id] = { ...ex, dayName: day.name }; });
  });
  
  // 收集本週訓練
  const weekLogs = Object.keys(workoutLogs)
    .filter(d => new Date(d) >= weekStart)
    .sort();
  
  // 收集本週飲食標籤統計
  const weekDiet = dietLogs.filter(e => new Date(e.time) >= weekStart);
  
  // 月經週期狀態
  const todayPhase = getPhase(todayKey());
  const phaseMap = { period: '經期', follicular: '濾泡期', luteal: '黃體期' };
  
  // 組合報告文字
  let text = `📊 Juuuudy 訓練週報\n`;
  text += `週期：${formatDate(weekStart.toISOString().split('T')[0])} ~ ${formatDate(todayKey())}\n`;
  text += `生理階段：${todayPhase ? phaseMap[todayPhase] : '未標記'}\n`;
  text += `本週訓練：${weekLogs.length} / 4 天\n\n`;
  
  if (weekLogs.length === 0) {
    text += `本週還沒有訓練紀錄。\n`;
  } else {
    weekLogs.forEach(date => {
      const log = workoutLogs[date];
      const exIds = Object.keys(log);
      // 推測這是哪一天的訓練（根據動作 id 前綴）
      const prefixes = exIds.map(id => id.split('_')[0]);
      const counts = {};
      prefixes.forEach(p => counts[p] = (counts[p] || 0) + 1);
      const mainPrefix = Object.keys(counts).sort((a,b) => counts[b] - counts[a])[0];
      const dayNameMap = { chest: '胸日', leg: '腿日', sh: '肩日', bk: '背日' };
      const dayName = dayNameMap[mainPrefix] || '訓練';
      
      text += `━━ ${formatDate(date)} ${dayName} ━━\n`;
      exIds.forEach(id => {
        const ex = exMeta[id];
        const l = log[id];
        if (!ex) return;
        const unit = ex.unit || 'kg';
        const feelMap = ['', '無感', '輕鬆', '剛好', '吃力', '爆酸'];
        text += `• ${ex.name}：${l.weight}${unit} × ${l.reps} × ${l.sets}組｜感受${l.feel}(${feelMap[l.feel]})\n`;
      });
      text += `\n`;
    });
  }
  
  // 飲食標籤統計
  if (weekDiet.length > 0) {
    text += `━━ 本週飲食標籤統計（${weekDiet.length} 餐）━━\n`;
    const tagCounts = {};
    weekDiet.forEach(e => {
      e.tags.forEach(t => tagCounts[t] = (tagCounts[t] || 0) + 1);
    });
    Object.entries(tagCounts).sort((a,b) => b[1] - a[1]).forEach(([t, c]) => {
      text += `• ${t}：${c} 次\n`;
    });
    text += `\n`;
  }
  
  // 跟前一週的對比（找重點動作的進步）
  const lastWeekStart = new Date(weekStart);
  lastWeekStart.setDate(lastWeekStart.getDate() - 7);
  const lastWeekLogs = Object.keys(workoutLogs)
    .filter(d => {
      const dd = new Date(d);
      return dd >= lastWeekStart && dd < weekStart;
    });
  
  if (lastWeekLogs.length > 0 && weekLogs.length > 0) {
    text += `━━ 與上週比較 ━━\n`;
    // 找各動作本週最大重量 vs 上週最大重量
    const thisWeekMax = {};
    const lastWeekMax = {};
    weekLogs.forEach(d => {
      Object.entries(workoutLogs[d]).forEach(([id, l]) => {
        if (!thisWeekMax[id] || l.weight > thisWeekMax[id]) thisWeekMax[id] = l.weight;
      });
    });
    lastWeekLogs.forEach(d => {
      Object.entries(workoutLogs[d]).forEach(([id, l]) => {
        if (!lastWeekMax[id] || l.weight > lastWeekMax[id]) lastWeekMax[id] = l.weight;
      });
    });
    Object.keys(thisWeekMax).forEach(id => {
      const ex = exMeta[id];
      if (!ex) return;
      const now = thisWeekMax[id];
      const prev = lastWeekMax[id];
      if (prev) {
        const diff = (now - prev).toFixed(1);
        const arrow = diff > 0 ? '↑' : (diff < 0 ? '↓' : '=');
        text += `• ${ex.name}：${prev} → ${now}${ex.unit||'kg'} ${arrow}${diff > 0 ? '+' : ''}${diff}\n`;
      }
    });
    text += `\n`;
  }
  
  text += `\n— 請 Claude 分析以上紀錄並給下週調整建議 —`;
  
  showExportModal('本週訓練紀錄（複製給 Claude）', text);
}

function exportAll() {
  const data = {
    exportDate: new Date().toISOString(),
    workoutLogs,
    dietLogs: dietLogs.map(e => ({ ...e, photo: '[照片省略，匯入時請重新拍照]' })), // 照片太大不匯出
    periodData
  };
  
  const text = JSON.stringify(data, null, 2);
  showExportModal('全部資料備份（匯入時用）', text);
  
  // 順便下載 JSON 檔
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `juuuudy-training-${todayKey()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function showExportModal(title, text) {
  document.getElementById('exportModalTitle').textContent = title;
  document.getElementById('exportTextarea').value = text;
  document.getElementById('exportModal').classList.add('show');
}

function closeExportModal() {
  document.getElementById('exportModal').classList.remove('show');
}

function copyExportText() {
  const textarea = document.getElementById('exportTextarea');
  textarea.select();
  textarea.setSelectionRange(0, 99999);
  
  // 優先用 Clipboard API
  if (navigator.clipboard) {
    navigator.clipboard.writeText(textarea.value).then(() => {
      showToast('✓ 已複製到剪貼簿');
      closeExportModal();
    }).catch(() => {
      document.execCommand('copy');
      showToast('✓ 已複製');
      closeExportModal();
    });
  } else {
    document.execCommand('copy');
    showToast('✓ 已複製');
    closeExportModal();
  }
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const data = JSON.parse(event.target.result);
      if (!confirm('匯入會覆蓋目前資料，確定嗎？\n（建議先「匯出全部資料」備份再匯入）')) {
        e.target.value = '';
        return;
      }
      if (data.workoutLogs) {
        workoutLogs = data.workoutLogs;
        STORAGE.set('workoutLogs', workoutLogs);
      }
      if (data.periodData) {
        periodData = data.periodData;
        STORAGE.set('periodData', periodData);
      }
      // 飲食照片因為匯出時被省略，所以不覆蓋現有飲食紀錄
      showToast('✓ 匯入完成（訓練+週期資料已更新）');
      // 重新渲染當前頁
      renderWorkout();
      renderProgress();
      renderCycle();
    } catch (err) {
      alert('匯入失敗：檔案格式錯誤\n' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// =========== Toast ===========
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// =========== 啟動 ===========
init();
